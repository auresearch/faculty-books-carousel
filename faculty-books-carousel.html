<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recent Faculty Books</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: transparent; display: flex; justify-content: center; align-items: flex-start; min-height: auto; padding: 0; margin: 0; }
  .carousel-wrapper { width: 100%; max-width: 960px; }
  .carousel-header { text-align: center; margin-bottom: 2rem; }
  .carousel-header h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #1a1a2e; letter-spacing: -0.02em; position: relative; display: inline-block; }
  .carousel-header h2::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: #c41e3a; border-radius: 2px; }
  .carousel-container { position: relative; overflow: hidden; border-radius: 16px; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04); }
  .carousel-track { display: flex; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .carousel-slide { min-width: 100%; display: flex; align-items: stretch; }
  .slide-accent { width: 8px; flex-shrink: 0; background: linear-gradient(180deg, #c41e3a 0%, #8b1528 100%); }
  .slide-content { flex: 1; display: flex; align-items: center; padding: 3rem 3.5rem; gap: 2.5rem; }
  .book-cover-wrap { flex-shrink: 0; width: 140px; position: relative; }
  .book-cover-wrap img { width: 140px; height: auto; max-height: 210px; object-fit: cover; border-radius: 4px 8px 8px 4px; box-shadow: 4px 4px 16px rgba(0,0,0,0.18), -2px 0 8px rgba(0,0,0,0.06); display: block; }
  .book-cover-wrap .book-school-badge { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
  .book-icon-fallback { width: 140px; height: 190px; background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4e 100%); border-radius: 4px 8px 8px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; box-shadow: 4px 4px 16px rgba(0,0,0,0.15), -2px 0 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
  .book-icon-fallback::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: rgba(255,255,255,0.1); border-radius: 4px 0 0 4px; }
  .book-icon-fallback svg { width: 36px; height: 36px; fill: rgba(255,255,255,0.7); margin-bottom: 0.5rem; }
  .book-school-badge { font-size: 0.65rem; font-weight: 600; color: #fff; background: rgba(196,30,58,0.85); padding: 3px 10px; border-radius: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
  .book-details { flex: 1; min-width: 0; }
  .book-date { font-size: 0.8rem; font-weight: 500; color: #c41e3a; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .book-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: #1a1a2e; line-height: 1.3; margin-bottom: 0.75rem; }
  .book-author { font-size: 1rem; font-weight: 500; color: #444; margin-bottom: 1.25rem; }
  .book-link { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-weight: 600; color: #c41e3a; text-decoration: none; padding: 0.6rem 1.4rem; border: 2px solid #c41e3a; border-radius: 8px; transition: all 0.25s ease; }
  .book-link:hover { background: #c41e3a; color: #fff; }
  .book-link svg { width: 16px; height: 16px; fill: currentColor; transition: transform 0.25s ease; }
  .book-link:hover svg { transform: translateX(3px); }
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,0.95); box-shadow: 0 2px 12px rgba(0,0,0,0.12); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.2s ease; }
  .carousel-btn:hover { background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.18); transform: translateY(-50%) scale(1.08); }
  .carousel-btn svg { width: 20px; height: 20px; fill: #1a1a2e; }
  .carousel-btn-prev { left: 12px; }
  .carousel-btn-next { right: 12px; }
  .carousel-dots { display: flex; justify-content: center; gap: 8px; padding: 1.25rem 0; }
  .carousel-dot { width: 10px; height: 10px; border-radius: 50%; border: none; background: #d4d4d4; cursor: pointer; transition: all 0.3s ease; padding: 0; }
  .carousel-dot.active { background: #c41e3a; transform: scale(1.2); }
  .carousel-dot:hover:not(.active) { background: #999; }
  .carousel-counter { text-align: center; font-size: 0.8rem; color: #888; padding-bottom: 0.5rem; }
  @media (max-width: 700px) { .slide-content { flex-direction: column; padding: 2rem 1.5rem; text-align: center; gap: 1.5rem; } .book-cover-wrap { width: 110px; } .book-cover-wrap img { width: 110px; max-height: 165px; } .book-icon-fallback { width: 110px; height: 150px; } .book-title { font-size: 1.25rem; } .carousel-btn { width: 36px; height: 36px; } .carousel-btn svg { width: 16px; height: 16px; } .carousel-btn-prev { left: 6px; } .carousel-btn-next { right: 6px; } }
</style>
</head>
<body>
<div class="carousel-wrapper">
  <div class="carousel-header"><h2>Recent Faculty Books</h2></div>
  <div class="carousel-container" role="region" aria-label="Faculty Books Carousel" aria-roledescription="carousel">
    <div class="carousel-track" id="carouselTrack"></div>
    <button class="carousel-btn carousel-btn-prev" aria-label="Previous book" onclick="prevSlide()"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
    <button class="carousel-btn carousel-btn-next" aria-label="Next book" onclick="nextSlide()"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg></button>
  </div>
  <div class="carousel-dots" id="carouselDots"></div>
  <div class="carousel-counter" id="carouselCounter"></div>
</div>
<script>
var books=[{title:"Runaway Capitalism",author:"James H. Mittelman",school:"SIS",date:"November 2025",url:"https://www.routledge.com/Runaway-Capitalism/HMittelman/p/book/9781041038870",cover:"runaway- capitalism.jpg"},{title:"Corrections at Work: A Call for Institutional Accountability",author:"TaLisa J. Carter",school:"SPA / SOE",date:"December 2025",url:"https://nyupress.org/9781479823185/corrections-at-work/",cover:"corrections-at- work.jpg"},{title:"No Option But Sabotage",author:"Thomas Zeitzoff",school:"SPA",date:"February 2026",url:"https://global.oup.com/academic/product/no-option-but-sabotage-9780197796849",cover:"no-pption-but-sabotage.jpg"},{title:"Antisemitism, an American Tradition",author:"Pamela S. Nadell",school:"CAS",date:"October 2025",url:"https://wwnorton.com/books/9781324050643",cover:"antisemitism.jpg"},{title:"Man Up: The New Misogyny and the Rise of Violent Extremism",author:"Cynthia Miller-Idriss",school:"SPA",date:"September 2025",url:"https://press.princeton.edu/books/hardcover/9780691257549/man-up",cover:"man-up.jpg"},{title:"Debating the American Dream: How Explanations for Inequality Polarize Politics",author:"Elizabeth Suhay",school:"SPA",date:"October 2025",url:"https://www.russellsage.org/publications/book/debating-american-dream",cover:"debating-the-american-dream.jpg"},{title:"Dealmakers: The Psychology of Legislative Compromise",author:"David C. Barker",school:"SPA",date:"October 2025",url:"https://global.oup.com/academic/product/dealmakers-9780197801390",cover:"dealmakers.jpg"},{title:"Building a Green Wall: Irish America\u0027s Resurgence Post-Brexit",author:"Carolyn Gallaher \u0026 Kimberly Cowell-Meyers",school:"SIS / SPA",date:"November 2025",url:"https://bristoluniversitypressdigital.com/monobook/book/9781529238020/9781529238020.xml",cover:"building-a-green- wall.jpg"},{title:"The Counterinsurgency Dilemma",author:"Tricia Bacon",school:"SPA",date:"March 2026",url:"https://www.sup.org/books/politics/counterinsurgency-dilemma",cover:"counterinsurgency-dilemma.jpg"},{title:"Conservative at the Core",author:"Allan J. Lichtman",school:"SPA",date:"September 2025",url:"https://undpress.nd.edu/9780268210304/conservative-at-the-core/",cover:"conservative-at-the-core.jpg"}];
var track=document.getElementById("carouselTrack"),dotsContainer=document.getElementById("carouselDots"),counter=document.getElementById("carouselCounter"),current=0,autoplayTimer;
var bookSvg='<svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>';
var arrowSvg='<svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>';
books.forEach(function(book,i){var slide=document.createElement("div");slide.className="carousel-slide";slide.setAttribute("role","group");slide.setAttribute("aria-roledescription","slide");slide.setAttribute("aria-label",(i+1)+" of "+books.length);var coverHtml=book.cover?'<div class="book-cover-wrap"><img src="'+book.cover+'" alt="Cover of '+book.title+'" onerror="this.style.display=\'none\'" loading="lazy"><span class="book-school-badge">'+book.school+'</span></div>':'<div class="book-cover-wrap"><div class="book-icon-fallback">'+bookSvg+'</div><span class="book-school-badge">'+book.school+'</span></div>';slide.innerHTML='<div class="slide-accent"></div><div class="slide-content">'+coverHtml+'<div class="book-details"><div class="book-date">'+book.date+'</div><div class="book-title">'+book.title+'</div><div class="book-author">'+book.author+'</div><a class="book-link" href="'+book.url+'" target="_blank" rel="noopener noreferrer">View Book '+arrowSvg+'</a></div></div>';track.appendChild(slide);var dot=document.createElement("button");dot.className="carousel-dot"+(i===0?" active":"");dot.setAttribute("aria-label","Go to book "+(i+1));dot.addEventListener("click",function(){goToSlide(i)});dotsContainer.appendChild(dot)});
function updateCarousel(){track.style.transform="translateX(-"+current*100+"%)";document.querySelectorAll(".carousel-dot").forEach(function(d,i){d.classList.toggle("active",i===current)});counter.textContent=(current+1)+" / "+books.length}
function nextSlide(){current=(current+1)%books.length;updateCarousel();resetAutoplay()}
function prevSlide(){current=(current-1+books.length)%books.length;updateCarousel();resetAutoplay()}
function goToSlide(index){current=index;updateCarousel();resetAutoplay()}
function resetAutoplay(){clearInterval(autoplayTimer);autoplayTimer=setInterval(nextSlide,5000)}
updateCarousel();autoplayTimer=setInterval(nextSlide,5000);
var container=document.querySelector(".carousel-container");
container.addEventListener("mouseenter",function(){clearInterval(autoplayTimer)});
container.addEventListener("mouseleave",function(){autoplayTimer=setInterval(nextSlide,5000)});
document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")prevSlide();if(e.key==="ArrowRight")nextSlide()});
var touchStartX=0,touchEndX=0;
container.addEventListener("touchstart",function(e){touchStartX=e.changedTouches[0].screenX},{passive:true});
container.addEventListener("touchend",function(e){touchEndX=e.changedTouches[0].screenX;var diff=touchStartX-touchEndX;if(Math.abs(diff)>50){diff>0?nextSlide():prevSlide()}});
function sendHeight(){var height=document.querySelector(".carousel-wrapper").offsetHeight;window.parent.postMessage({type:"carousel-resize",height:height},"*")}
sendHeight();window.addEventListener("resize",sendHeight);
</script>
</body>
</html>
